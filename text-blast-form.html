<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCTD Text Blast</title>
<style>
  :root {
    --ink: #1c2b2e;
    --paper: #f6f4ee;
    --panel: #ffffff;
    --line: #dcd7c9;
    --teal: #2f5e56;
    --teal-dark: #203f3a;
    --gold: #b8863a;
    --error: #a3403b;
    --ok: #2f6e4e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 16px;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 32px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    color: var(--teal-dark);
    letter-spacing: 0.2px;
  }
  .sub {
    margin: 0 0 28px;
    font-size: 13px;
    color: #6b6659;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--teal-dark);
    margin-bottom: 6px;
  }
  .field { margin-bottom: 20px; }
  select, textarea, input[type="text"] {
    width: 100%;
    font-size: 15px;
    font-family: inherit;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fdfdfb;
    color: var(--ink);
  }
  select:focus, textarea:focus, input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(47, 94, 86, 0.15);
  }
  textarea {
    resize: vertical;
    min-height: 90px;
  }
  .charcount {
    text-align: right;
    font-size: 12px;
    color: #948d7a;
    margin-top: 4px;
  }
  .charcount.over { color: var(--error); font-weight: 600; }
  .groups {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 7px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    background: #fdfdfb;
    user-select: none;
  }
  .chip.selected {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }
  button.send {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    color: white;
    background: var(--teal);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 8px;
  }
  button.send:hover { background: var(--teal-dark); }
  button.send:disabled { background: #a9b3af; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
  }
  .status.ok { display: block; background: #e8f2ea; color: var(--ok); }
  .status.error { display: block; background: #f6e7e6; color: var(--error); }
  .status.pending { display: block; background: #eef1ee; color: #58615c; }
  .hint {
    font-size: 12px;
    color: #948d7a;
    margin-top: -12px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Send a group text</h1>
  <p class="sub">Fill this in and it goes out through EZ Texting.</p>

  <div class="field">
    <label for="sender">Your name</label>
    <input type="text" id="sender" placeholder="e.g. Sarah M.">
  </div>

  <div class="field">
    <label for="groupList">Send to</label>
    <div id="groupList" class="groups">
      <span style="font-size:13px;color:#948d7a;">Loading groups…</span>
    </div>
  </div>

  <div class="field">
    <label for="message">Message</label>
    <textarea id="message" maxlength="480" placeholder="Type the text here…"></textarea>
    <div class="charcount" id="charcount">0 / 160</div>
  </div>

  <button class="send" id="sendBtn">Send text</button>

  <div class="status" id="status"></div>
</div>

<script>
  // Paste the Web App URL from your Apps Script deployment here:
  const API_URL = "https://script.google.com/macros/s/AKfycbyTmaorLv24eT9kBqUUBFZT3uUnjYm8fGg-bUw3UqyTegxpwqFPkJMQCN-XwzDRFQ7f/exec";

  const groupListEl = document.getElementById('groupList');
  const senderEl = document.getElementById('sender');
  const messageEl = document.getElementById('message');
  const charcountEl = document.getElementById('charcount');
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('status');

  let selectedGroups = new Set();

  function setStatus(text, kind) {
    statusEl.className = 'status ' + kind;
    statusEl.textContent = text;
  }

  // Apps Script quirk: sending Content-Type: text/plain avoids a CORS
  // preflight request, which Apps Script Web Apps don't handle. The
  // body is still valid JSON — Apps Script parses it fine on the other end.
  function callBackend(payload) {
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).then(function (r) { return r.json(); });
  }

  function loadGroups() {
    fetch(API_URL + '?action=groups')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        groupListEl.innerHTML = '';
        if (!data.ok) {
          groupListEl.innerHTML = '<span style="font-size:13px;color:#a3403b;">' + data.error + '</span>';
          return;
        }
        if (!data.groups.length) {
          groupListEl.innerHTML = '<span style="font-size:13px;color:#948d7a;">No groups found in EZ Texting.</span>';
          return;
        }
        data.groups.forEach(function (name) {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = name;
          chip.addEventListener('click', function () {
            if (selectedGroups.has(name)) {
              selectedGroups.delete(name);
              chip.classList.remove('selected');
            } else {
              selectedGroups.add(name);
              chip.classList.add('selected');
            }
          });
          groupListEl.appendChild(chip);
        });
      })
      .catch(function () {
        groupListEl.innerHTML = '<span style="font-size:13px;color:#a3403b;">Couldn\'t reach the backend. Check API_URL.</span>';
      });
  }

  messageEl.addEventListener('input', function () {
    const len = messageEl.value.length;
    charcountEl.textContent = len + ' / 160';
    charcountEl.classList.toggle('over', len > 160);
  });

  sendBtn.addEventListener('click', function () {
    const sender = senderEl.value.trim();
    const message = messageEl.value.trim();
    const groups = Array.from(selectedGroups);

    if (!sender) { setStatus('Enter your name first.', 'error'); return; }
    if (!message) { setStatus('Type a message first.', 'error'); return; }
    if (!groups.length) { setStatus('Pick at least one group.', 'error'); return; }

    sendBtn.disabled = true;
    setStatus('Sending…', 'pending');

    callBackend({ action: 'send', sender: sender, message: message, groups: groups })
      .then(function (data) {
        sendBtn.disabled = false;
        if (data.ok) {
          setStatus('Sent to ' + data.result.RecipientsCount + ' recipients.', 'ok');
          messageEl.value = '';
          charcountEl.textContent = '0 / 160';
          selectedGroups.clear();
          document.querySelectorAll('.chip.selected').forEach(function (c) { c.classList.remove('selected'); });
        } else {
          setStatus(data.error || 'Something went wrong.', 'error');
        }
      })
      .catch(function () {
        sendBtn.disabled = false;
        setStatus('Could not reach the backend.', 'error');
      });
  });

  loadGroups();
</script>

</body>
</html>
